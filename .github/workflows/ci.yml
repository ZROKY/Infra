name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  test-node:
    name: Test (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  test-python:
    name: Test (Python)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - engine-safety
          - engine-grounding
          - engine-consistency
          - engine-system
          - trust-computer
          - health-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install and test ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: |
          pip install -e ".[dev]"
          pytest tests/ -v

  lint-python:
    name: Lint (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install ruff

      - name: Lint all Python services
        run: |
          for dir in services/engine-* services/trust-computer services/health-check; do
            echo "Linting $dir..."
            ruff check "$dir/src/" "$dir/tests/" || exit 1
          done

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test-node, test-python, lint-python]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
