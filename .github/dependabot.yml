version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        patterns: ["*"]
        dependency-type: development

  - package-ecosystem: pip
    directory: /services/engine-safety
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directory: /services/engine-grounding
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directory: /services/engine-consistency
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directory: /services/engine-system
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directory: /services/trust-computer
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directory: /services/health-check
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
