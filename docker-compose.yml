# ZROKY Local Development Stack
# Usage: docker compose up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: zroky-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: zroky
      POSTGRES_USER: zroky
      POSTGRES_PASSWORD: zroky_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zroky"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zroky-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: zroky-clickhouse
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # Native
    environment:
      CLICKHOUSE_DB: zroky_analytics
      CLICKHOUSE_USER: zroky
      CLICKHOUSE_PASSWORD: zroky_dev_password
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:latest
    container_name: zroky-pubsub-emulator
    ports:
      - "8085:8085"
    command: gcloud beta emulators pubsub start --host-port=0.0.0.0:8085 --project=zroky-dev
    environment:
      PUBSUB_PROJECT_ID: zroky-dev

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:
