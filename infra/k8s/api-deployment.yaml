apiVersion: apps/v1
kind: Deployment
metadata:
  name: zroky-api
  namespace: zroky-production
  labels:
    app: zroky-api
    component: api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: zroky-api
  template:
    metadata:
      labels:
        app: zroky-api
        component: api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: gcr.io/zroky-production/zroky-api:latest
          ports:
            - containerPort: 3001
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: LOG_LEVEL
              value: "info"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: zroky-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: zroky-secrets
                  key: redis-url
            - name: API_KEY_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: zroky-secrets
                  key: api-key-hmac-secret
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: zroky-secrets
                  key: stripe-secret-key
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
---
apiVersion: v1
kind: Service
metadata:
  name: zroky-api
  namespace: zroky-production
  labels:
    app: zroky-api
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3001
      protocol: TCP
  selector:
    app: zroky-api
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: zroky-api-hpa
  namespace: zroky-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: zroky-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: zroky-api-pdb
  namespace: zroky-production
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: zroky-api
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: zroky-api-netpol
  namespace: zroky-production
spec:
  podSelector:
    matchLabels:
      app: zroky-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: zroky-production
      ports:
        - protocol: TCP
          port: 3001
  egress:
    # Allow DNS
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow PostgreSQL
    - to: []
      ports:
        - protocol: TCP
          port: 5432
    # Allow Redis
    - to: []
      ports:
        - protocol: TCP
          port: 6379
    # Allow HTTPS outbound (Stripe, Slack webhooks)
    - to: []
      ports:
        - protocol: TCP
          port: 443
